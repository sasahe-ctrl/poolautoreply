<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>泳池话术生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f0f4ff;
            min-height: 100vh;
            padding-bottom: 40px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 16px 16px;
            color: white;
            text-align: center;
        }
        .header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .header p { font-size: 13px; opacity: 0.85; }

        .quick-section {
            padding: 14px 16px 12px;
            background: white;
            border-bottom: 1px solid #eee;
        }
        .quick-label { font-size: 12px; color: #999; margin-bottom: 10px; display: block; }
        .quick-group { margin-bottom: 10px; }
        .quick-group-label { font-size: 11px; color: #bbb; margin-bottom: 6px; display: block; letter-spacing: 0.5px; }
        .quick-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .quick-btn {
            padding: 9px 14px;
            background: #f0f4ff;
            border: 1.5px solid #d0d8ff;
            border-radius: 20px;
            font-size: 13px;
            color: #4a5ab5;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 500;
            transition: all 0.15s;
        }
        .quick-btn:active { background: #667eea; color: white; border-color: #667eea; transform: scale(0.96); }

        .input-section {
            background: white;
            margin: 12px 12px 0;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .input-label { font-size: 13px; color: #888; margin-bottom: 10px; display: block; }
        #customer-question {
            width: 100%;
            height: 90px;
            padding: 12px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            resize: none;
            outline: none;
            font-family: inherit;
            color: #333;
            background: #fafafa;
            transition: border-color 0.2s;
        }
        #customer-question:focus { border-color: #667eea; background: white; }
        #generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            letter-spacing: 1px;
            transition: opacity 0.2s, transform 0.1s;
        }
        #generate-btn:active { transform: scale(0.98); }
        #generate-btn:disabled { opacity: 0.55; }

        .loading { display: none; text-align: center; padding: 32px 16px; }
        .loading.show { display: block; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { font-size: 14px; color: #888; }

        .results { display: none; padding: 0 12px; }
        .results.show { display: block; }
        .results-title { font-size: 13px; color: #888; margin: 16px 0 10px; padding-left: 4px; }
        .result-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            animation: fadeUp 0.3s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .type-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .tag-standard   { background: #EEF2FF; color: #4338CA; }
        .tag-promotion  { background: #FFF7ED; color: #C2410C; }
        .tag-training   { background: #ECFDF5; color: #065F46; }
        .tag-proactive  { background: #FAF5FF; color: #6B21A8; }
        .tag-objection  { background: #FFF1F2; color: #9F1239; }
        .result-content {
            font-size: 16px;
            line-height: 1.8;
            color: #222;
            white-space: pre-wrap;
            margin-bottom: 14px;
        }
        .copy-btn {
            width: 100%;
            padding: 14px;
            background: #f5f7ff;
            border: 1.5px solid #d0d8ff;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.15s;
        }
        .copy-btn:active { background: #667eea; color: white; border-color: #667eea; transform: scale(0.98); }
        .copy-btn.copied { background: #ECFDF5; color: #065F46; border-color: #6EE7B7; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏊‍♂️ 泳池话术生成器</h1>
        <p>点击常见问题或输入客户问题，一键生成专业回复</p>
    </div>

    <div class="quick-section">
        <span class="quick-label">📌 高频问题快捷生成</span>

        <div class="quick-group">
            <span class="quick-group-label">💰 价格相关</span>
            <div class="quick-row">
                <button class="quick-btn" onclick="quickGenerate('请问游泳卡多少钱?')">💰 多少钱?</button>
                <button class="quick-btn" onclick="quickGenerate('现在有什么优惠吗?')">🎁 有什么优惠?</button>
                <button class="quick-btn" onclick="quickGenerate('我去年买过卡，老客户有优惠吗?')">⭐ 老客户优惠?</button>
                <button class="quick-btn" onclick="quickGenerate('有点贵，能便宜点吗?')">💸 能便宜点吗?</button>
                <button class="quick-btn" onclick="quickGenerate('游泳卡可以退款吗?')">💔 可以退款吗?</button>
                <button class="quick-btn" onclick="quickGenerate('游泳卡可以转让给别人用吗?')">🔄 可以转让吗?</button>
            </div>
        </div>

        <div class="quick-group">
            <span class="quick-group-label">📅 时间 & 购买</span>
            <div class="quick-row">
                <button class="quick-btn" onclick="quickGenerate('泳池什么时候开放?')">📅 什么时候开放?</button>
                <button class="quick-btn" onclick="quickGenerate('每天几点到几点营业?')">⏰ 营业时间?</button>
                <button class="quick-btn" onclick="quickGenerate('怎么买卡？在哪里买?')">🛒 怎么买卡?</button>
            </div>
        </div>

        <div class="quick-group">
            <span class="quick-group-label">👶 培训相关</span>
            <div class="quick-row">
                <button class="quick-btn" onclick="quickGenerate('我家孩子想学游泳，你们有培训班吗?')">👶 孩子想学游泳</button>
                <button class="quick-btn" onclick="quickGenerate('培训班几个人一班？有没有私教？')">👥 培训班人数?</button>
                <button class="quick-btn" onclick="quickGenerate('别人家游泳培训班是包教包会的，你们有保证吗?')">🎓 包教包会吗?</button>
                <button class="quick-btn" onclick="quickGenerate('成人没有基础可以学游泳吗?')">🏊 成人能学吗?</button>
            </div>
        </div>

        <div class="quick-group" style="margin-bottom:0">
            <span class="quick-group-label">🛟 安全 & 规定</span>
            <div class="quick-row">
                <button class="quick-btn" onclick="quickGenerate('你们泳池水质怎么样？安全吗?')">💧 水质怎么样?</button>
                <button class="quick-btn" onclick="quickGenerate('你们有救生员吗？安全有保障吗?')">🛟 有救生员吗?</button>
                <button class="quick-btn" onclick="quickGenerate('进去游泳有什么注意事项和规定?')">❓ 有什么规定?</button>
            </div>
        </div>
    </div>

    <div class="input-section">
        <span class="input-label">或粘贴客户的原话</span>
        <textarea id="customer-question" placeholder="把客户发给你的消息粘贴进来..."></textarea>
        <button id="generate-btn" onclick="generateResponses()">✨ 生成话术</button>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>AI正在生成话术，请稍候...</p>
    </div>

    <div class="results" id="results">
        <div class="results-title">以下是AI生成的销售话术，选一个复制👇</div>
    </div>

    <script>
        const SYSTEM_PROMPT = `你是泳池运营中心的销售话术专家。根据客户问题，生成3-5个不同策略的专业销售回复。

【泳池完整业务信息】

开放时间：
- 6月1日至9月30日
- 每天三个时段：早上8:00-12:00、下午3:00-6:00、晚上7:00-9:00

价格体系：
- 20次卡：标准价420元，老客户预售价400元（6月15日前截止）
- 30次卡：标准价600元，老客户预售价540元（6月15日前截止）
- 次卡不记名，可自用、可转让、可送人，不退不换不挂失

培训班：
- 启蒙班：4-7岁零基础，10节课800元，4-8人小班
- 进阶班：7岁以上会游泳，10节课1000元，4-8人小班
- 私教可选：一对一、一对二、一对三，教练质量更高、时间更自由
- 成班后教练提前约时间，先付款先选时间段
- 培训承诺：教练全程跟进，负责到底，进度因人而异

购卡方式：
- 群内接龙
- 泳池前台直接购买

安全与设施：
- 持证救生员全程在岗
- 水质符合国家游泳场所标准，定期检测
- 1.2米以下儿童必须成人陪同

使用规则：
- 必须戴泳帽、穿泳衣
- 次卡不退不换不挂失，但可转让（不记名）

【话术生成规则】

生成3-5个不同策略的回复，每个回复：
- 类型：标准型、促销型、培训型、主动型、异议处理型
- 自然口语化，不超过5句话
- 先答问题，再推进销售
- 不用"亲""哦""呢"等词
- 不夸大承诺，不虚构信息

只输出JSON，不要任何其他内容：
{"responses":[{"type":"标准型","content":"话术内容，换行用\\n"},{"type":"促销型","content":"..."}]}`;

        function quickGenerate(question) {
            document.getElementById('customer-question').value = question;
            generateResponses();
        }

        async function generateResponses() {
            const question = document.getElementById('customer-question').value.trim();
            if (!question) { alert('请先输入客户问题'); return; }

            const btn = document.getElementById('generate-btn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');

            btn.disabled = true;
            loading.classList.add('show');
            results.classList.remove('show');

            const title = results.querySelector('.results-title');
            results.innerHTML = '';
            results.appendChild(title);

            try {
                const response = await fetch('/.netlify/functions/claude', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1500,
                        system: SYSTEM_PROMPT,
                        messages: [{ role: 'user', content: `客户问题：${question}` }]
                    })
                });

                const rawText = await response.text();
                console.log('Raw response:', rawText);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${rawText}`);
                }

                let data;
                try {
                    data = JSON.parse(rawText);
                } catch(e) {
                    throw new Error(`返回内容解析失败: ${rawText.substring(0, 200)}`);
                }

                if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

                const text = data.content[0].text;
                const clean = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                const parsed = JSON.parse(clean);
                renderResults(parsed.responses);

            } catch (err) {
                alert('生成失败：' + err.message + '\n请重试');
            } finally {
                btn.disabled = false;
                loading.classList.remove('show');
            }
        }

        const typeMap = {
            '标准型':     { cls: 'tag-standard',  icon: '💰' },
            '促销型':     { cls: 'tag-promotion', icon: '🎁' },
            '培训型':     { cls: 'tag-training',  icon: '👶' },
            '主动型':     { cls: 'tag-proactive', icon: '🎯' },
            '异议处理型': { cls: 'tag-objection', icon: '💡' },
        };

        function renderResults(responses) {
            const results = document.getElementById('results');
            const title = results.querySelector('.results-title');

            responses.forEach((resp, i) => {
                const meta = typeMap[resp.type] || { cls: 'tag-standard', icon: '💬' };
                const card = document.createElement('div');
                card.className = 'result-card';
                card.style.animationDelay = `${i * 0.08}s`;
                const escaped = resp.content.replace(/\\/g, '\\\\').replace(/`/g, '\\`');
                card.innerHTML = `
                    <div class="type-tag ${meta.cls}">${meta.icon} ${resp.type}</div>
                    <div class="result-content">${resp.content}</div>
                    <button class="copy-btn" onclick="copyText(this, \`${escaped}\`)">
                        📋 复制这条话术
                    </button>`;
                results.appendChild(card);
            });

            results.classList.add('show');
            results.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function copyText(btn, content) {
            const doFallback = () => {
                const ta = document.createElement('textarea');
                ta.value = content;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.focus(); ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            };
            const markCopied = () => {
                btn.textContent = '✅ 已复制，去微信粘贴吧';
                btn.classList.add('copied');
                setTimeout(() => { btn.innerHTML = '📋 复制这条话术'; btn.classList.remove('copied'); }, 2500);
            };
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(content).then(markCopied).catch(() => { doFallback(); markCopied(); });
            } else { doFallback(); markCopied(); }
        }

        document.getElementById('customer-question').addEventListener('keydown', e => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generateResponses();
        });
    </script>
</body>
</html>
